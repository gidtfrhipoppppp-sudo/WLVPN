# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE are ignored when `gradlew` is used.
# buildTypes {
#    debug {
#        debuggable true
#    }
# }

# When set to true, Gradle will run the Android Gradle plugin in process.
# org.gradle.configureondemand=true
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m

# Android-Gradle default settings.
org.gradle.jvmargs=-Xmx1024m

# Gradle parallel builds
# org.gradle.parallel=true
# org.gradle.parallelThreads=4

# AndroidX package structure
android.enableJetifier=true
android.useAndroidX=true
